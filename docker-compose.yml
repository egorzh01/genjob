services:
  genjob:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    command: ["uvicorn", "genjob.cmd.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: "always"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./src:/genjob/src

  postgres:
    image: postgres:17-alpine
    env_file: .env
    restart: "always"
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgresql:/var/lib/postgresql/data
